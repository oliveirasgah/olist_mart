version: 2

models:
  - name: fct_orders
    description: >
      One row per order, combining order status and timestamps with aggregated
      item, freight, and payment metrics. Incrementally loaded based on purchased_at.
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_customers')
              field: customer_id
      - name: order_status
        tests:
          - not_null
          - accepted_values:
              values:
                - created
                - approved
                - invoiced
                - processing
                - shipped
                - delivered
                - unavailable
                - canceled
      - name: purchased_at
        tests:
          - not_null
      - name: purchased_date
        tests:
          - not_null
          - relationships:
              to: ref('dim_dates')
              field: date_day
      - name: items_count
        tests:
          - not_null
      - name: total_items_price
        tests:
          - not_null
      - name: total_freight_value
        tests:
          - not_null
      - name: total_order_value
        tests:
          - not_null
      - name: total_payment_value
        tests:
          - not_null
